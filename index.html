<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parefy — PDF Tools for iOS</title>
    <meta name="description" content="Parefy is a privacy-first PDF utility for iPhone and iPad. Compress, merge, split, sign, and more — entirely on your device.">
    <link rel="canonical" href="https://parefy.com/">
    <link rel="icon" type="image/png" href="assets/icon-512.png">
    <link rel="apple-touch-icon" href="assets/icon-512.png">
    <style>
        :root {
            --bg: #FFFFFF;
            --text: #1D1D1F;
            --secondary: #6E6E73;
            --accent: #0071E3;
            --border: #E5E5EA;
            --card-bg: #F5F5F7;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --text: #F5F5F7;
                --secondary: #A1A1A6;
                --accent: #2997FF;
                --border: #38383A;
                --card-bg: #1C1C1E;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 48px 24px;
            text-align: center;
        }
        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 26px;
            margin-bottom: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
        }
        @media (prefers-color-scheme: dark) {
            .app-icon {
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            }
        }
        h1 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }
        .tagline {
            font-size: 18px;
            color: var(--secondary);
            margin-bottom: 40px;
        }
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 40px;
        }
        .feature-tag {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }
        .cta {
            display: inline-block;
            background: var(--accent);
            color: #FFFFFF;
            font-size: 17px;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            margin-bottom: 48px;
            transition: opacity 0.2s;
        }
        .cta:hover { opacity: 0.85; text-decoration: none; }
        .links {
            display: flex;
            gap: 24px;
            justify-content: center;
            font-size: 14px;
        }
        .links a {
            color: var(--secondary);
            text-decoration: none;
        }
        .links a:hover {
            color: var(--accent);
        }
        footer {
            margin-top: 64px;
            font-size: 13px;
            color: var(--secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="assets/icon-512.png" alt="Parefy" class="app-icon">
        <h1>Parefy</h1>
        <p class="tagline">PDF tools for iOS. Private by design.</p>

        <div class="features">
            <span class="feature-tag">Compress</span>
            <span class="feature-tag">Merge</span>
            <span class="feature-tag">Split</span>
            <span class="feature-tag">Sign</span>
            <span class="feature-tag">Extract</span>
            <span class="feature-tag">Watermark</span>
            <span class="feature-tag">Password</span>
            <span class="feature-tag">Scan</span>
            <span class="feature-tag">Photos to PDF</span>
            <span class="feature-tag">Page Manager</span>
        </div>

        <a class="cta" href="https://apps.apple.com/app/parefy/id0000000000">Download on the App Store</a>

        <div class="links">
            <a href="/privacy">Privacy Policy</a>
            <a href="/terms">Terms of Use</a>
            <a href="mailto:support@parefy.com">Contact</a>
        </div>

        <footer>
            &copy; 2026 Parefy. All rights reserved.
        </footer>
    </div>
</body>
</html>
